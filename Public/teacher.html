<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Connect — Teacher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .connection-info {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px 32px;
            text-align: center;
            margin-bottom: 40px;
            max-width: 500px;
            width: 100%;
        }

        .connection-info label {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .connection-info .address {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6;
            margin-top: 8px;
            font-family: monospace;
        }

        .lobby {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
        }

        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .lobby-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .student-count {
            background: #3b82f6;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
        }

        .student-list {
            list-style: none;
        }

        .student-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #0f172a;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 1.1rem;
            animation: slideIn 0.3s ease;
        }

        .student-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Classroom Connect</h1>
        <p>Teacher Dashboard</p>
    </div>

    <div class="connection-info">
        <label>Students connect to:</label>
        <div class="address" id="studentAddress">Loading...</div>
    </div>

    <div class="lobby">
        <div class="lobby-header">
            <h2>Student Lobby</h2>
            <span class="student-count" id="studentCount">0 students</span>
        </div>
        <ul class="student-list" id="studentList">
            <li class="empty-state">
                <div>
                    <div class="icon">⏳</div>
                    <div>Waiting for students to connect...</div>
                </div>
            </li>
        </ul>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Display the student connection address
        const address = window.location.hostname + ":" + window.location.port + "/student.html";
        document.getElementById("studentAddress").textContent = address;

        // Color palette for student avatars
        const colors = ["#3b82f6", "#8b5cf6", "#ec4899", "#f59e0b", "#10b981", "#ef4444", "#06b6d4", "#f97316"];

        // Listen for student list updates
        socket.on("student-list", (students) => {
            const list = document.getElementById("studentList");
            const count = document.getElementById("studentCount");

            count.textContent = students.length + (students.length === 1 ? " student" : " students");

            if (students.length === 0) {
                list.innerHTML = `
                    <li class="empty-state">
                        <div>
                            <div class="icon">⏳</div>
                            <div>Waiting for students to connect...</div>
                        </div>
                    </li>
                `;
                return;
            }

            list.innerHTML = students.map((student, index) => {
                const initial = student.name.charAt(0).toUpperCase();
                const color = colors[index % colors.length];
                return `
                    <li>
                        <div class="student-avatar" style="background: ${color}">${initial}</div>
                        <span>${student.name}</span>
                    </li>
                `;
            }).join("");
        });
    </script>
</body>
</html>
