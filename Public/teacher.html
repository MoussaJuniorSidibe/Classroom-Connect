<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Connect — Teacher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p { color: #94a3b8; font-size: 1rem; }

        .nav-link {
            display: inline-block;
            color: #3b82f6;
            text-decoration: none;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .nav-link:hover { text-decoration: underline; }

        .main-layout {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
        }

        .connection-info {
            text-align: center;
            padding: 16px 24px;
        }

        .connection-info label {
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .connection-info .address {
            font-size: 1.5rem;
            font-weight: 700;
            color: #3b82f6;
            margin-top: 4px;
            font-family: monospace;
        }

        /* BUTTONS */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            width: 100%;
        }

        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .badge {
            background: #3b82f6;
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* LESSON SELECT */
        .lesson-select-item {
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lesson-select-item:hover { border-color: #3b82f6; }
        .lesson-select-item.selected { border-color: #3b82f6; background: #1e3a5f; }

        .lesson-select-item h3 { font-size: 1.05rem; margin-bottom: 4px; }
        .lesson-select-meta { color: #64748b; font-size: 0.85rem; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h2 { font-size: 1.2rem; }

        /* LOBBY */
        .student-grid { display: flex; flex-wrap: wrap; gap: 8px; }

        .student-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: #0f172a;
            border-radius: 8px;
            font-size: 0.95rem;
            animation: slideIn 0.3s ease;
        }

        .student-dot { width: 10px; height: 10px; border-radius: 50%; }

        .empty-state { text-align: center; padding: 20px; color: #64748b; }

        /* SLIDE INFO */
        .slide-counter {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .slide-type-indicator {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .type-content { background: #1e3a5f; color: #60a5fa; }
        .type-question { background: #3b1f63; color: #c084fc; }

        .content-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .content-body {
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* ANSWER TRACKER */
        .answer-summary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            background: #0f172a;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .answer-summary .count { font-size: 2rem; font-weight: 800; color: #3b82f6; }
        .answer-summary .label { color: #94a3b8; font-size: 0.95rem; }

        .student-tracker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }

        .tracker-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tracker-chip.waiting { background: #1a1f2e; border: 1px solid #334155; color: #64748b; }
        .tracker-chip.answered { background: #064e3b; border: 1px solid #10b981; color: #a7f3d0; animation: chipPop 0.3s ease; }

        .all-answered-hint {
            text-align: center;
            color: #10b981;
            font-weight: 600;
            margin-bottom: 12px;
            display: none;
        }

        /* RESULTS */
        .results-bar-container { margin-bottom: 12px; }
        .results-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.95rem; }
        .results-bar-label .option-text { color: #e2e8f0; }
        .results-bar-label .option-count { color: #94a3b8; }
        .results-bar { height: 32px; background: #0f172a; border-radius: 6px; overflow: hidden; }
        .results-bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; min-width: 2px; }
        .results-bar-fill.correct { background: linear-gradient(135deg, #10b981, #059669); }
        .results-bar-fill.incorrect { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .correct-indicator { color: #10b981; font-weight: 700; }

        /* LEADERBOARD */
        .leaderboard-item {
            display: flex; align-items: center; gap: 16px;
            padding: 14px 16px; background: #0f172a;
            border-radius: 10px; margin-bottom: 8px;
            animation: slideIn 0.3s ease;
        }

        .leaderboard-rank { font-size: 1.5rem; font-weight: 800; width: 40px; text-align: center; }
        .rank-1 { color: #fbbf24; }
        .rank-2 { color: #94a3b8; }
        .rank-3 { color: #b45309; }
        .leaderboard-name { flex: 1; font-size: 1.1rem; font-weight: 600; }
        .leaderboard-score { font-size: 1.1rem; font-weight: 800; color: #3b82f6; }

        .final-title {
            text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 24px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes chipPop { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Classroom Connect</h1>
        <p>Teacher Dashboard</p>
        <a href="/builder.html" class="nav-link">→ Open Lesson Builder</a>
    </div>

    <div class="main-layout">
        <div class="card connection-info">
            <label>Students connect to:</label>
            <div class="address" id="studentAddress">Loading...</div>
        </div>

        <!-- LESSON SELECT + LOBBY SCREEN -->
        <div class="screen active" id="lobbyScreen">
            <div class="card">
                <div class="section-header">
                    <h2>Select a Lesson</h2>
                </div>
                <div id="lessonSelect">
                    <div class="empty-state">Loading lessons...</div>
                </div>
            </div>

            <div class="card" style="margin-top:16px;">
                <div class="section-header">
                    <h2>Student Lobby</h2>
                    <span class="badge" id="studentCount">0 students</span>
                </div>
                <div class="student-grid" id="studentList">
                    <div class="empty-state">⏳ Waiting for students to connect...</div>
                </div>
            </div>

            <br>
            <button class="btn btn-primary" id="startBtn" onclick="startSession()" disabled>
                Start Session
            </button>
        </div>

        <!-- CONTENT SLIDE SCREEN -->
        <div class="screen" id="contentScreen">
            <div class="card">
                <div class="slide-counter" id="contentSlideCounter">Slide 1 of 10</div>
                <span class="slide-type-indicator type-content">Content</span>
                <div class="content-title" id="contentTitle"></div>
                <div class="content-body" id="contentBody"></div>
            </div>
            <br>
            <button class="btn btn-success" onclick="nextSlide()">Next Slide →</button>
        </div>

        <!-- QUESTION SCREEN -->
        <div class="screen" id="questionScreen">
            <div class="card">
                <div class="slide-counter" id="questionSlideCounter">Slide 3 of 10</div>
                <span class="slide-type-indicator type-question">Question</span>
                <div class="question-text" id="questionText"></div>

                <div class="answer-summary">
                    <div class="count" id="answeredCount">0</div>
                    <div class="label">of <span id="totalStudents">0</span> answered</div>
                </div>

                <div class="student-tracker" id="studentTracker"></div>

                <div class="all-answered-hint" id="allAnsweredHint">✓ All students have answered!</div>
                <button class="btn btn-warning" onclick="showResults()">Reveal Answer</button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div class="screen" id="resultsScreen">
            <div class="card">
                <div class="slide-counter" id="resultsSlideCounter"></div>
                <div class="question-text" id="resultsQuestionText" style="font-size:1.1rem;margin-bottom:16px;"></div>
                <div id="resultsBars"></div>
                <div style="text-align:center;margin-top:12px;margin-bottom:16px;">
                    <span id="correctSummary" class="correct-indicator"></span>
                </div>
                <div id="miniLeaderboard" style="margin-bottom:16px;"></div>
                <button class="btn btn-success" onclick="nextSlide()">Next Slide →</button>
            </div>
        </div>

        <!-- FINAL LEADERBOARD SCREEN -->
        <div class="screen" id="leaderboardScreen">
            <div class="card">
                <div class="final-title">🏆 Final Leaderboard</div>
                <div id="leaderboardList"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const colors = ["#3b82f6","#8b5cf6","#ec4899","#f59e0b","#10b981","#ef4444","#06b6d4","#f97316"];
        let selectedLessonId = null;
        let questionIndex = -1;

        const address = window.location.hostname + ":" + window.location.port + "/student.html";
        document.getElementById("studentAddress").textContent = address;

        function showScreen(screenId) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(screenId).classList.add("active");
        }

        // ====== LOAD LESSONS ======
        async function loadLessons() {
            const res = await fetch("/api/lessons");
            const lessons = await res.json();
            const container = document.getElementById("lessonSelect");

            if (lessons.length === 0) {
                container.innerHTML = `<div class="empty-state">No lessons found. <a href="/builder.html" style="color:#3b82f6;">Create one first →</a></div>`;
                return;
            }

            container.innerHTML = lessons.map(l => `
                <div class="lesson-select-item ${selectedLessonId === l.id ? 'selected' : ''}"
                     onclick="selectLesson('${l.id}')">
                    <h3>${l.title}</h3>
                    <div class="lesson-select-meta">${l.contentCount} content · ${l.questionCount} questions · ${l.slideCount} slides total</div>
                </div>
            `).join("");
        }

        function selectLesson(id) {
            selectedLessonId = id;
            updateStartButton();
            loadLessons(); // Re-render to show selection
        }

        function updateStartButton() {
            const btn = document.getElementById("startBtn");
            const hasStudents = document.querySelectorAll(".student-chip").length > 0;
            btn.disabled = !selectedLessonId || !hasStudents;
        }

        // ====== STUDENTS ======
        socket.on("student-list", (students) => {
            const list = document.getElementById("studentList");
            const count = document.getElementById("studentCount");

            count.textContent = students.length + (students.length === 1 ? " student" : " students");

            if (students.length === 0) {
                list.innerHTML = '<div class="empty-state">⏳ Waiting for students to connect...</div>';
            } else {
                list.innerHTML = students.map((s, i) => {
                    const color = colors[i % colors.length];
                    return `<div class="student-chip"><div class="student-dot" style="background:${color}"></div>${s.name}</div>`;
                }).join("");
            }

            updateStartButton();
        });

        // ====== SESSION ======
        function startSession() {
            if (!selectedLessonId) return;
            socket.emit("start-session", selectedLessonId);
        }

        socket.on("session-started", (info) => {
            questionIndex = -1;
            // Automatically go to first slide
            nextSlide();
        });

        function nextSlide() {
            socket.emit("next-slide");
        }

        // ====== TEACHER SLIDE INFO ======
        socket.on("teacher-slide-info", (data) => {
            if (data.type === "content") {
                showScreen("contentScreen");
                document.getElementById("contentSlideCounter").textContent = `Slide ${data.slideIndex + 1} of ${data.totalSlides}`;
                document.getElementById("contentTitle").textContent = data.title;
                document.getElementById("contentBody").textContent = data.body;
            } else if (data.type === "question") {
                questionIndex = data.questionIndex;
                showScreen("questionScreen");
                document.getElementById("questionSlideCounter").textContent = `Slide ${data.slideIndex + 1} of ${data.totalSlides}`;
                document.getElementById("questionText").textContent = data.question;
                document.getElementById("allAnsweredHint").style.display = "none";
            }
        });

        // ====== ANSWER TRACKING ======
        socket.on("answer-status", (status) => {
            document.getElementById("answeredCount").textContent = status.answered;
            document.getElementById("totalStudents").textContent = status.total;

            if (status.answered === status.total && status.total > 0) {
                document.getElementById("allAnsweredHint").style.display = "block";
            } else {
                document.getElementById("allAnsweredHint").style.display = "none";
            }
        });

        socket.on("detailed-answer-status", (students) => {
            const tracker = document.getElementById("studentTracker");
            tracker.innerHTML = students.map(s => {
                if (s.hasAnswered) {
                    return `<div class="tracker-chip answered"><span>✓</span> ${s.name}</div>`;
                } else {
                    return `<div class="tracker-chip waiting"><span>⏳</span> ${s.name}</div>`;
                }
            }).join("");
        });

        function showResults() {
            socket.emit("show-results");
        }

        // ====== QUESTION RESULTS ======
        socket.on("question-results", (results) => {
            showScreen("resultsScreen");
            document.getElementById("resultsQuestionText").textContent = results.question;
            document.getElementById("resultsSlideCounter").textContent = `Question ${questionIndex + 1} — Results`;

            const maxCount = Math.max(...results.optionCounts, 1);

            document.getElementById("resultsBars").innerHTML = results.options.map((opt, i) => {
                const count = results.optionCounts[i];
                const isCorrect = i === results.correctIndex;
                const width = (count / maxCount) * 100;
                const cls = isCorrect ? "correct" : "incorrect";
                const marker = isCorrect ? " ✓" : "";
                return `
                    <div class="results-bar-container">
                        <div class="results-bar-label">
                            <span class="option-text">${opt}${marker}</span>
                            <span class="option-count">${count} ${count === 1 ? "student" : "students"}</span>
                        </div>
                        <div class="results-bar"><div class="results-bar-fill ${cls}" style="width:${width}%"></div></div>
                    </div>
                `;
            }).join("");

            document.getElementById("correctSummary").textContent =
                `${results.correctCount} of ${results.totalStudents} answered correctly`;

            if (results.leaderboard.length > 0) {
                document.getElementById("miniLeaderboard").innerHTML =
                    "<h3 style='margin-bottom:10px;font-size:1rem;color:#94a3b8;'>Top 5</h3>" +
                    results.leaderboard.map((s, i) => `
                        <div class="leaderboard-item" style="padding:8px 12px;margin-bottom:4px;">
                            <div class="leaderboard-rank rank-${i+1}" style="font-size:1.1rem;width:28px;">${i+1}</div>
                            <div class="leaderboard-name" style="font-size:0.95rem;">${s.name}</div>
                            <div class="leaderboard-score" style="font-size:0.95rem;">${s.score} pts</div>
                        </div>
                    `).join("");
            }
        });

        // ====== FINAL LEADERBOARD ======
        socket.on("session-ended", (leaderboard) => {
            showScreen("leaderboardScreen");
            document.getElementById("leaderboardList").innerHTML = leaderboard.map((s, i) => {
                const rankClass = i < 3 ? `rank-${i+1}` : "";
                const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}`;
                return `
                    <div class="leaderboard-item">
                        <div class="leaderboard-rank ${rankClass}">${medal}</div>
                        <div class="leaderboard-name">${s.name}</div>
                        <div class="leaderboard-score">${s.score} pts</div>
                    </div>
                `;
            }).join("");
        });

        // ====== INIT ======
        loadLessons();
    </script>
</body>
</html>
