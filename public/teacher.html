<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Connect — Teacher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 30px 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
        .header p { color: #94a3b8; font-size: 1rem; }
        .nav-links { margin-top: 10px; display: flex; justify-content: center; gap: 20px; }
        .nav-link { color: #3b82f6; text-decoration: none; font-size: 0.9rem; }
        .nav-link:hover { text-decoration: underline; }
        .lang-toggle { position: fixed; top: 16px; right: 16px; background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; z-index: 100; }
        .lang-toggle:hover { background: #475569; }
        .main-layout { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 24px; }
        .connection-info { text-align: center; padding: 16px 24px; }
        .connection-info label { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .connection-info .address { font-size: 1.5rem; font-weight: 700; color: #3b82f6; margin-top: 4px; font-family: monospace; }
        .btn { padding: 14px 28px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; }
        .btn:hover { opacity: 0.9; } .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .badge { background: #3b82f6; color: white; padding: 4px 14px; border-radius: 20px; font-weight: 700; font-size: 0.9rem; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-header h2 { font-size: 1.2rem; }
        .select-item { background: #0f172a; border: 2px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; }
        .select-item:hover { border-color: #3b82f6; }
        .select-item.selected { border-color: #3b82f6; background: #1e3a5f; }
        .select-item h3 { font-size: 1.05rem; margin-bottom: 4px; }
        .select-meta { color: #64748b; font-size: 0.85rem; }
        .no-class-option { background: #0f172a; border: 2px dashed #334155; border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; text-align: center; color: #64748b; font-size: 0.9rem; }
        .no-class-option:hover { border-color: #475569; }
        .no-class-option.selected { border-color: #3b82f6; color: #3b82f6; }
        .student-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .student-chip { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #0f172a; border-radius: 8px; font-size: 0.95rem; }
        .student-dot { width: 10px; height: 10px; border-radius: 50%; }
        .empty-state { text-align: center; padding: 20px; color: #64748b; }
        .slide-counter { text-align: center; color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .slide-type-indicator { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; }
        .type-content { background: #1e3a5f; color: #60a5fa; } .type-question { background: #3b1f63; color: #c084fc; }
        .content-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; line-height: 1.4; }
        .content-body { color: #cbd5e1; font-size: 1.05rem; line-height: 1.7; white-space: pre-wrap; }
        .content-image { width: 100%; max-height: 400px; object-fit: contain; border-radius: 10px; margin-top: 16px; background: #0f172a; }
        .question-text { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; line-height: 1.4; }
        .answer-summary { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; background: #0f172a; border-radius: 10px; margin-bottom: 12px; }
        .answer-summary .count { font-size: 2rem; font-weight: 800; color: #3b82f6; }
        .answer-summary .label { color: #94a3b8; font-size: 0.95rem; }
        .student-tracker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .tracker-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
        .tracker-chip.waiting { background: #1a1f2e; border: 1px solid #334155; color: #64748b; }
        .tracker-chip.answered { background: #064e3b; border: 1px solid #10b981; color: #a7f3d0; }
        .all-answered-hint { text-align: center; color: #10b981; font-weight: 600; margin-bottom: 12px; display: none; }
        .results-bar-container { margin-bottom: 12px; }
        .results-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.95rem; }
        .results-bar-label .option-text { color: #e2e8f0; } .results-bar-label .option-count { color: #94a3b8; }
        .results-bar { height: 32px; background: #0f172a; border-radius: 6px; overflow: hidden; }
        .results-bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; min-width: 2px; }
        .results-bar-fill.correct { background: linear-gradient(135deg, #10b981, #059669); }
        .results-bar-fill.incorrect { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .correct-indicator { color: #10b981; font-weight: 700; }
        .leaderboard-item { display: flex; align-items: center; gap: 16px; padding: 14px 16px; background: #0f172a; border-radius: 10px; margin-bottom: 8px; }
        .leaderboard-rank { font-size: 1.5rem; font-weight: 800; width: 40px; text-align: center; }
        .rank-1 { color: #fbbf24; } .rank-2 { color: #94a3b8; } .rank-3 { color: #b45309; }
        .leaderboard-name { flex: 1; font-size: 1.1rem; font-weight: 600; }
        .leaderboard-score { font-size: 1.1rem; font-weight: 800; color: #3b82f6; }
        .final-title { text-align: center; font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .screen { display: none; } .screen.active { display: block; }
    </style>
</head>
<body>
    <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">FR</button>
    <div class="header">
        <h1>Classroom Connect</h1>
        <p id="headerSubtitle"></p>
        <div class="nav-links">
            <a href="/builder.html" class="nav-link" id="builderLink"></a>
            <a href="/roster.html" class="nav-link" id="rosterLink"></a>
            <a href="/history.html" class="nav-link" id="historyLink"></a>
        </div>
    </div>
    <div class="main-layout">
        <div class="card connection-info">
            <label id="connectLabel"></label>
            <div class="address" id="studentAddress">Loading...</div>
        </div>

        <div class="screen active" id="lobbyScreen">
            <div class="card">
                <div class="section-header"><h2 id="selectLessonTitle"></h2></div>
                <div id="lessonSelect"><div class="empty-state">Loading...</div></div>
            </div>
            <div class="card" style="margin-top:16px;">
                <div class="section-header"><h2 id="selectClassTitle"></h2></div>
                <div id="classSelect"></div>
            </div>
            <div class="card" style="margin-top:16px;">
                <div class="section-header">
                    <h2 id="lobbyTitle"></h2>
                    <span class="badge" id="studentCount">0</span>
                </div>
                <div class="student-grid" id="studentList"></div>
            </div>
            <br>
            <button class="btn btn-primary" id="startBtn" onclick="startSession()" disabled></button>
        </div>

        <div class="screen" id="contentScreen">
            <div class="card">
                <div class="slide-counter" id="contentSlideCounter"></div>
                <span class="slide-type-indicator type-content" id="contentTypeLabel"></span>
                <div class="content-title" id="contentTitle"></div>
                <div class="content-body" id="contentBody"></div>
                <img class="content-image" id="contentImage" style="display:none;">
            </div><br>
            <button class="btn btn-success" id="contentNextBtn" onclick="nextSlide()"></button>
        </div>

        <div class="screen" id="questionScreen">
            <div class="card">
                <div class="slide-counter" id="questionSlideCounter"></div>
                <span class="slide-type-indicator type-question" id="questionTypeLabel"></span>
                <div class="question-text" id="questionText"></div>
                <div class="answer-summary">
                    <div class="count" id="answeredCount">0</div>
                    <div class="label"><span id="ofLabel"></span> <span id="totalStudents">0</span> <span id="answeredLabel"></span></div>
                </div>
                <div class="student-tracker" id="studentTracker"></div>
                <div class="all-answered-hint" id="allAnsweredHint"></div>
                <button class="btn btn-warning" id="revealBtn" onclick="showResults()"></button>
            </div>
        </div>

        <div class="screen" id="resultsScreen">
            <div class="card">
                <div class="slide-counter" id="resultsSlideCounter"></div>
                <div class="question-text" id="resultsQuestionText" style="font-size:1.1rem;margin-bottom:16px;"></div>
                <div id="resultsBars"></div>
                <div style="text-align:center;margin-top:12px;margin-bottom:16px;"><span id="correctSummary" class="correct-indicator"></span></div>
                <div id="miniLeaderboard" style="margin-bottom:16px;"></div>
                <button class="btn btn-success" id="resultsNextBtn" onclick="nextSlide()"></button>
            </div>
        </div>

        <div class="screen" id="leaderboardScreen">
            <div class="card">
                <div class="final-title" id="finalTitle"></div>
                <div id="leaderboardList"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/i18n.js"></script>
    <script>
        const socket = io();
        const colors = ["#3b82f6","#8b5cf6","#ec4899","#f59e0b","#10b981","#ef4444","#06b6d4","#f97316"];
        let selectedLessonId = null, selectedClassId = null, questionIndex = -1, lastStudentList = [], lastLessons = [], lastClasses = [];

        document.getElementById("studentAddress").textContent = window.location.hostname + ":" + window.location.port + "/student.html";

        function showScreen(id) { document.querySelectorAll(".screen").forEach(s => s.classList.remove("active")); document.getElementById(id).classList.add("active"); }

        function updateUI() {
            document.getElementById("langToggle").textContent = t("langToggle");
            document.getElementById("headerSubtitle").textContent = t("teacherDashboard");
            document.getElementById("builderLink").textContent = t("openBuilder");
            document.getElementById("rosterLink").textContent = t("openRoster");
            document.getElementById("historyLink").textContent = t("openHistory");
            document.getElementById("connectLabel").textContent = t("studentsConnectTo");
            document.getElementById("selectLessonTitle").textContent = t("selectLesson");
            document.getElementById("selectClassTitle").textContent = t("selectClass");
            document.getElementById("lobbyTitle").textContent = t("studentLobby");
            document.getElementById("startBtn").textContent = t("startSession");
            document.getElementById("contentTypeLabel").textContent = t("content");
            document.getElementById("contentNextBtn").textContent = t("nextSlide");
            document.getElementById("questionTypeLabel").textContent = t("question");
            document.getElementById("ofLabel").textContent = t("ofAnswered");
            document.getElementById("answeredLabel").textContent = t("answered");
            document.getElementById("allAnsweredHint").textContent = t("allAnswered");
            document.getElementById("revealBtn").textContent = t("revealAnswer");
            document.getElementById("resultsNextBtn").textContent = t("nextSlide");
            document.getElementById("finalTitle").textContent = t("finalLeaderboard");
            renderStudentList(lastStudentList); renderLessonList(lastLessons); renderClassList(lastClasses);
        }

        // ====== LESSONS ======
        async function loadLessons() { const res = await fetch("/api/lessons"); lastLessons = await res.json(); renderLessonList(lastLessons); }
        function renderLessonList(lessons) {
            const c = document.getElementById("lessonSelect");
            if (lessons.length === 0) { c.innerHTML = `<div class="empty-state">${t("noLessonsFound")} <a href="/builder.html" style="color:#3b82f6;">${t("createOneFirst")}</a></div>`; return; }
            c.innerHTML = lessons.map(l => {
                const cs = l.contentCount + " " + t("contentSlides") + (l.contentCount !== 1 ? "s" : "");
                const qs = l.questionCount + " " + t("questionsLabel") + (l.questionCount !== 1 ? "s" : "");
                return `<div class="select-item ${selectedLessonId === l.id ? 'selected' : ''}" onclick="selectLesson('${l.id}')"><h3>${l.title}</h3><div class="select-meta">${cs} · ${qs}</div></div>`;
            }).join("");
        }
        function selectLesson(id) { selectedLessonId = id; updateStartButton(); renderLessonList(lastLessons); }

        // ====== CLASSES ======
        async function loadClasses() { const res = await fetch("/api/classes"); lastClasses = await res.json(); renderClassList(lastClasses); }
        function renderClassList(classes) {
            const c = document.getElementById("classSelect");
            let html = `<div class="no-class-option ${selectedClassId === null ? 'selected' : ''}" onclick="selectClass(null)">${t("noClassSelected")}</div>`;
            if (classes.length > 0) {
                html += classes.map(cl =>
                    `<div class="select-item ${selectedClassId === cl.id ? 'selected' : ''}" onclick="selectClass('${cl.id}')"><h3>${cl.name}</h3><div class="select-meta">${tFormat("studentsCount", cl.student_count)}</div></div>`
                ).join("");
            }
            c.innerHTML = html;
        }
        function selectClass(id) { selectedClassId = id; renderClassList(lastClasses); }

        function updateStartButton() { document.getElementById("startBtn").disabled = !selectedLessonId || lastStudentList.length === 0; }

        // ====== STUDENTS ======
        socket.on("student-list", (students) => { lastStudentList = students; renderStudentList(students); updateStartButton(); });
        function renderStudentList(students) {
            const list = document.getElementById("studentList"), count = document.getElementById("studentCount");
            count.textContent = students.length + " " + (students.length === 1 ? t("student") : t("students"));
            if (students.length === 0) { list.innerHTML = `<div class="empty-state">${t("waitingForStudents")}</div>`; }
            else { list.innerHTML = students.map((s, i) => `<div class="student-chip"><div class="student-dot" style="background:${colors[i%colors.length]}"></div>${s.name}</div>`).join(""); }
        }

        // ====== SESSION ======
        function startSession() {
            if (!selectedLessonId) return;
            socket.emit("start-session", { lessonId: selectedLessonId, classId: selectedClassId });
        }
        socket.on("session-started", () => { questionIndex = -1; nextSlide(); });
        function nextSlide() { socket.emit("next-slide"); }

        socket.on("teacher-slide-info", (data) => {
            if (data.type === "content") {
                showScreen("contentScreen");
                document.getElementById("contentSlideCounter").textContent = tFormat("slideOf", data.slideIndex + 1, data.totalSlides);
                document.getElementById("contentTitle").textContent = data.title;
                document.getElementById("contentBody").textContent = data.body;
                const img = document.getElementById("contentImage");
                if (data.image) { img.src = data.image; img.style.display = "block"; } else { img.style.display = "none"; }
            } else if (data.type === "question") {
                questionIndex = data.questionIndex; showScreen("questionScreen");
                document.getElementById("questionSlideCounter").textContent = tFormat("slideOf", data.slideIndex + 1, data.totalSlides);
                document.getElementById("questionText").textContent = data.question;
                document.getElementById("allAnsweredHint").style.display = "none";
            }
        });

        socket.on("answer-status", (status) => {
            document.getElementById("answeredCount").textContent = status.answered;
            document.getElementById("totalStudents").textContent = status.total;
            document.getElementById("allAnsweredHint").style.display = (status.answered === status.total && status.total > 0) ? "block" : "none";
        });

        socket.on("detailed-answer-status", (students) => {
            document.getElementById("studentTracker").innerHTML = students.map(s =>
                s.hasAnswered ? `<div class="tracker-chip answered"><span>✓</span> ${s.name}</div>` : `<div class="tracker-chip waiting"><span>⏳</span> ${s.name}</div>`
            ).join("");
        });

        function showResults() { socket.emit("show-results"); }

        socket.on("question-results", (results) => {
            showScreen("resultsScreen");
            document.getElementById("resultsQuestionText").textContent = results.question;
            document.getElementById("resultsSlideCounter").textContent = t("question") + " " + (questionIndex + 1) + " — " + t("results");
            const mx = Math.max(...results.optionCounts, 1), sl = (n) => n === 1 ? t("student") : t("students");
            document.getElementById("resultsBars").innerHTML = results.options.map((opt, i) => {
                const cnt = results.optionCounts[i], ic = i === results.correctIndex, w = (cnt / mx) * 100;
                return `<div class="results-bar-container"><div class="results-bar-label"><span class="option-text">${opt}${ic?" ✓":""}</span><span class="option-count">${cnt} ${sl(cnt)}</span></div><div class="results-bar"><div class="results-bar-fill ${ic?"correct":"incorrect"}" style="width:${w}%"></div></div></div>`;
            }).join("");
            document.getElementById("correctSummary").textContent = `${results.correctCount} ${t("ofAnswered")} ${results.totalStudents} ${t("answeredCorrectly")}`;
            if (results.leaderboard.length > 0) {
                document.getElementById("miniLeaderboard").innerHTML = `<h3 style="margin-bottom:10px;font-size:1rem;color:#94a3b8;">${t("top5")}</h3>` +
                    results.leaderboard.map((s, i) => `<div class="leaderboard-item" style="padding:8px 12px;margin-bottom:4px;"><div class="leaderboard-rank rank-${i+1}" style="font-size:1.1rem;width:28px;">${i+1}</div><div class="leaderboard-name" style="font-size:0.95rem;">${s.name}</div><div class="leaderboard-score" style="font-size:0.95rem;">${s.score} ${t("pts")}</div></div>`).join("");
            }
        });

        socket.on("session-ended", (leaderboard) => {
            showScreen("leaderboardScreen");
            document.getElementById("leaderboardList").innerHTML = leaderboard.map((s, i) => {
                const rc = i < 3 ? `rank-${i+1}` : "", m = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}`;
                return `<div class="leaderboard-item"><div class="leaderboard-rank ${rc}">${m}</div><div class="leaderboard-name">${s.name}</div><div class="leaderboard-score">${s.score} ${t("pts")}</div></div>`;
            }).join("");
        });

        loadLessons(); loadClasses(); updateUI();
    </script>
</body>
</html>
